<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的信息档案</title>
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <style>
    .section-title { font-size: 1rem; font-weight: 700; color: #1e40af; border-bottom: 2px solid #e0e7ff; padding-bottom: 0.4rem; margin-bottom: 1rem; }
    .card { background: #f8fafc; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
    .card-edit { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
    .label { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem; }
    .value { font-size: 0.9rem; color: #111827; }
    .tag { display: inline-block; background: #dbeafe; color: #1d4ed8; border-radius: 9999px; padding: 0.2rem 0.75rem; font-size: 0.8rem; margin: 0.2rem; }

    html.dark body { background:#0f172a !important; color:#f1f5f9; }
    html.dark .bg-gray-50 { background:#0f172a !important; }
    html.dark .bg-white { background:#1e293b !important; }
    html.dark .text-gray-800, html.dark .text-gray-700 { color:#f1f5f9 !important; }
    html.dark .text-gray-500, html.dark .text-gray-600 { color:#94a3b8 !important; }
    html.dark .text-gray-400 { color:#64748b !important; }
    html.dark .border-gray-200 { border-color:#334155 !important; }
    html.dark .section-title { color:#818cf8 !important; border-color:#1e3a5f !important; }
    html.dark .card { background:#334155 !important; }
    html.dark .card-edit { background:#1e3a5f !important; border-color:#3b82f6 !important; }
    html.dark .label { color:#94a3b8 !important; }
    html.dark .value { color:#f1f5f9 !important; }
    html.dark .tag { background:#1e3a5f !important; color:#93c5fd !important; }
    html.dark input, html.dark select, html.dark textarea { background:#0f172a !important; color:#f1f5f9 !important; border-color:#334155 !important; }
    html.dark input::placeholder, html.dark textarea::placeholder { color:#475569 !important; }
    html.dark .hover\:bg-gray-50:hover { background:#334155 !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-200">

<div class="max-w-3xl mx-auto py-12 px-4">

  <!-- Nav -->
  <div class="flex justify-center gap-2 mb-8">
    <a href="/" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">简历优化</a>
    <a href="/profile-page" class="px-5 py-2 rounded-full bg-blue-500 text-white text-sm font-medium">我的档案</a>
    <a href="/tracker" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">投递追踪</a>
    <a href="/interview" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">面试准备</a>
    <button onclick="toggleTheme()" id="themeBtn" class="w-9 h-9 rounded-full bg-white border border-gray-200 flex items-center justify-center text-base hover:border-gray-400 transition-colors shadow-sm">🌙</button>
  </div>

  <!-- 档案选择栏 -->
  <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 flex flex-wrap items-center gap-2">
    <select id="profileSelector" onchange="onProfileChange()"
      class="flex-1 min-w-[160px] border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 text-gray-700">
      <option value="">— 暂无档案 —</option>
    </select>
    <button onclick="openModal()"
      class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-4 py-2 rounded-lg transition-colors whitespace-nowrap">
      + 新建
    </button>
    <button onclick="renameCurrentProfile()"
      class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm px-3 py-2 rounded-lg transition-colors whitespace-nowrap">
      ✏️ 重命名
    </button>
    <button onclick="duplicateCurrentProfile()"
      class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm px-3 py-2 rounded-lg transition-colors whitespace-nowrap">
      📋 复制
    </button>
    <button onclick="deleteCurrentProfile()"
      class="bg-red-50 hover:bg-red-100 text-red-500 text-sm px-3 py-2 rounded-lg transition-colors whitespace-nowrap">
      🗑 删除
    </button>
  </div>

  <!-- 新建档案弹窗 -->
  <div id="newProfileModal" class="fixed inset-0 bg-black/40 items-center justify-center z-50" style="display:none">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-xl mx-4">
      <h2 class="text-lg font-bold text-gray-800 mb-5">新建档案</h2>
      <div class="space-y-4">
        <div>
          <div class="label">档案名称（如：金融方向简历）</div>
          <input id="newProfileName" placeholder="输入档案名称"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 mt-1"/>
        </div>
        <div>
          <div class="label">上传简历文件</div>
          <input id="newResumeFile" type="file" accept=".pdf,.docx"
            class="mt-1 block text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100 cursor-pointer"/>
        </div>
        <div id="modalStatus" class="text-sm text-gray-400 min-h-[1.25rem]"></div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="createProfile()"
          class="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-sm py-2 rounded-lg transition-colors">
          解析并保存
        </button>
        <button onclick="closeModal()"
          class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm py-2 rounded-lg transition-colors">
          取消
        </button>
      </div>
    </div>
  </div>

  <!-- 档案内容 -->
  <div id="profileContent" class="hidden space-y-6">

    <!-- 基本信息 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="section-title mb-0 border-0 pb-0">基本信息</div>
        <button onclick="editBasic()" class="text-xs text-blue-500 hover:text-blue-700">编辑</button>
      </div>
      <div class="border-b border-indigo-100 mb-4"></div>
      <div id="basicContent" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- 扩展信息 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="section-title mb-0 border-0 pb-0">扩展信息</div>
        <button onclick="editExtended()" class="text-xs text-blue-500 hover:text-blue-700">编辑</button>
      </div>
      <div class="border-b border-indigo-100 mb-4"></div>
      <p class="text-xs text-gray-400 mb-3">填写一次，各平台自动填入（年龄、民族、政治面貌等简历以外的字段）</p>
      <div id="extendedContent" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- 教育经历 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="section-title">教育经历</div>
      <div id="educationContent"></div>
    </div>

    <!-- 工作/实习经历 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="section-title">工作 / 实习经历</div>
      <div id="experienceContent"></div>
    </div>

    <!-- 项目经历 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="section-title">项目经历</div>
      <div id="projectsContent"></div>
    </div>

    <!-- 课外活动 -->
    <div id="activitiesSection" class="bg-white rounded-2xl shadow-sm p-6 hidden">
      <div class="section-title">课外活动</div>
      <div id="activitiesContent"></div>
    </div>

    <!-- 技能 & 语言 -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="section-title mb-0 border-0 pb-0">技能 & 语言</div>
        <button onclick="editSkills()" class="text-xs text-blue-500 hover:text-blue-700">编辑</button>
      </div>
      <div class="border-b border-indigo-100 mb-4"></div>
      <div id="skillsContent"></div>
    </div>

    <!-- 奖项 -->
    <div id="awardsSection" class="bg-white rounded-2xl shadow-sm p-6 hidden">
      <div class="section-title">奖项荣誉</div>
      <div id="awardsContent"></div>
    </div>

    <!-- 证书资质 -->
    <div id="certsSection" class="bg-white rounded-2xl shadow-sm p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="section-title mb-0 border-0 pb-0">证书资质</div>
      </div>
      <div class="border-b border-indigo-100 mb-4"></div>
      <p class="text-xs text-gray-400 mb-3">语言证书、职业资格证、计算机证书等</p>
      <div id="certsContent"></div>
    </div>

  </div>

  <!-- 空状态 -->
  <div id="emptyState" class="text-center py-16 text-gray-400">
    <p class="text-4xl mb-3">📄</p>
    <p class="text-sm">点击「新建档案」上传简历，自动解析生成个人档案</p>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════
let profileData = {};
let currentProfileId = null;

// 样式常量
const INP = 'w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400';
const TEA = 'w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 resize-none';
const BTN1 = 'bg-blue-500 hover:bg-blue-600 text-white text-xs px-4 py-1.5 rounded-lg transition-colors cursor-pointer';
const BTN2 = 'bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs px-4 py-1.5 rounded-lg transition-colors cursor-pointer';
const EDIT_BTN = 'text-xs text-blue-500 hover:text-blue-700 cursor-pointer';
const DEL_BTN = 'text-xs text-red-400 hover:text-red-600 cursor-pointer';
const ADD_BTN = 'text-sm text-blue-500 hover:text-blue-700 mt-2 cursor-pointer flex items-center gap-1';

// ═══════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════
async function init() {
  const profiles = await fetchProfiles();
  if (profiles.length > 0) {
    document.getElementById('profileSelector').value = profiles[0].id;
    await loadProfile(profiles[0].id);
  }
}

// ═══════════════════════════════════════════════
// 档案列表
// ═══════════════════════════════════════════════
async function fetchProfiles() {
  const res = await fetch('/profiles');
  const profiles = await res.json();
  const sel = document.getElementById('profileSelector');
  sel.innerHTML = profiles.length === 0
    ? '<option value="">— 暂无档案 —</option>'
    : profiles.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  return profiles;
}

async function onProfileChange() {
  const id = parseInt(document.getElementById('profileSelector').value);
  if (id) await loadProfile(id);
}

// ═══════════════════════════════════════════════
// 加载档案
// ═══════════════════════════════════════════════
async function loadProfile(id) {
  currentProfileId = id;
  const res = await fetch(`/profiles/${id}`);
  if (!res.ok) return;
  profileData = await res.json();
  renderProfile(profileData);
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('profileContent').classList.remove('hidden');
}

// ═══════════════════════════════════════════════
// 保存到服务器
// ═══════════════════════════════════════════════
async function saveProfile() {
  if (!currentProfileId) return;
  await fetch(`/profiles/${currentProfileId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(profileData)
  });
}

// ═══════════════════════════════════════════════
// 重命名档案
// ═══════════════════════════════════════════════
async function renameCurrentProfile() {
  if (!currentProfileId) return;
  const sel = document.getElementById('profileSelector');
  const oldName = sel.options[sel.selectedIndex]?.text || '';
  const newName = prompt('请输入新档案名称：', oldName);
  if (!newName || !newName.trim() || newName.trim() === oldName) return;
  const res = await fetch(`/profiles/${currentProfileId}/rename`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName.trim() })
  });
  if (res.ok) {
    await fetchProfiles();
    document.getElementById('profileSelector').value = currentProfileId;
  }
}

// ═══════════════════════════════════════════════
// 复制档案
// ═══════════════════════════════════════════════
async function duplicateCurrentProfile() {
  if (!currentProfileId) return;
  const res = await fetch(`/profiles/${currentProfileId}/duplicate`, { method: 'POST' });
  if (!res.ok) return;
  const { id, name } = await res.json();
  await fetchProfiles();
  document.getElementById('profileSelector').value = id;
  await loadProfile(id);
  alert(`已复制为「${name}」`);
}

// ═══════════════════════════════════════════════
// 删除档案
// ═══════════════════════════════════════════════
async function deleteCurrentProfile() {
  if (!currentProfileId) return;
  if (!confirm('确定要删除这份档案吗？此操作不可撤销。')) return;
  await fetch(`/profiles/${currentProfileId}`, { method: 'DELETE' });
  currentProfileId = null;
  profileData = {};
  const profiles = await fetchProfiles();
  if (profiles.length > 0) {
    document.getElementById('profileSelector').value = profiles[0].id;
    await loadProfile(profiles[0].id);
  } else {
    document.getElementById('profileContent').classList.add('hidden');
    document.getElementById('emptyState').classList.remove('hidden');
  }
}

// ═══════════════════════════════════════════════
// 新建档案弹窗
// ═══════════════════════════════════════════════
function openModal() {
  document.getElementById('newProfileModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('newProfileModal').style.display = 'none';
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('newProfileName').value = '';
  document.getElementById('newResumeFile').value = '';
}

async function createProfile() {
  const name = document.getElementById('newProfileName').value.trim();
  const file = document.getElementById('newResumeFile').files[0];
  const status = document.getElementById('modalStatus');
  if (!name) { alert('请输入档案名称'); return; }
  if (!file) { alert('请选择简历文件'); return; }

  status.textContent = '⏳ 正在解析简历...';

  try {
    // Step 1: 解析
    const formData = new FormData();
    formData.append('file', file);
    const parseRes = await fetch('/parse-resume', { method: 'POST', body: formData });
    if (!parseRes.ok) { status.textContent = `❌ 服务器错误 ${parseRes.status}`; return; }
    const parsed = await parseRes.json();
    if (parsed.status !== 'ok') {
      status.textContent = '❌ 解析失败：' + (parsed.message || '请重试');
      return;
    }

    // Step 2: 保存
    status.textContent = '💾 保存中...';
    const saveRes = await fetch('/profiles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, data: parsed.data })
    });
    if (!saveRes.ok) { status.textContent = `❌ 保存失败 ${saveRes.status}`; return; }
    const saved = await saveRes.json();

    closeModal();
    await fetchProfiles();
    document.getElementById('profileSelector').value = saved.id;
    await loadProfile(saved.id);
  } catch (e) {
    status.textContent = '❌ 请求失败：' + e.message;
  }
}

// ═══════════════════════════════════════════════
// 渲染全档案
// ═══════════════════════════════════════════════
function renderProfile(d) {
  renderBasic(d.basic);
  renderExtended(d.extended);
  renderEducation(d.education);
  renderExperience(d.experience);
  renderProjects(d.projects);
  renderActivities(d.activities);
  renderSkills(d.skills);
  renderAwards(d.awards);
  renderCerts(d.certificates);
}

// ═══════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════
function fv(v) { return v || ''; }
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bulletsToText(b) { return (b || []).join('\n'); }
function textToBullets(t) { return t.split('\n').map(s => s.trim()).filter(s => s.length > 0); }
function ef(label, id, val) {
  return `<div><div class="label">${label}</div><input id="${id}" class="${INP}" value="${esc(val)}"></div>`;
}
function renderBulletsHtml(bullets) {
  if (!bullets || bullets.length === 0) return '';
  return `<ul class="mt-2 space-y-1">${bullets.map(b =>
    `<li class="text-xs text-gray-500 flex gap-2"><span class="text-blue-300 mt-0.5">•</span><span>${esc(b)}</span></li>`
  ).join('')}</ul>`;
}
function actionBtns(editFn, deleteFn) {
  return `<div class="flex gap-3">
    <button onclick="${editFn}" class="${EDIT_BTN}">编辑</button>
    <button onclick="${deleteFn}" class="${DEL_BTN}">删除</button>
  </div>`;
}

// ═══════════════════════════════════════════════
// 基本信息
// ═══════════════════════════════════════════════
function renderBasic(basic) {
  basic = basic || {};
  const fields = [['姓名',basic.name],['邮箱',basic.email],['手机',basic.phone],['城市',basic.location],['LinkedIn',basic.linkedin]];
  document.getElementById('basicContent').innerHTML = fields
    .filter(([,v]) => v && v !== '无')
    .map(([l,v]) => `<div><div class="label">${l}</div><div class="value">${esc(v)}</div></div>`)
    .join('');
}

function editBasic() {
  const b = profileData.basic || {};
  document.getElementById('basicContent').innerHTML = `
    <div class="col-span-2 grid grid-cols-2 gap-3">
      ${ef('姓名','b-name',b.name)}
      ${ef('邮箱','b-email',b.email)}
      ${ef('手机','b-phone',b.phone)}
      ${ef('城市','b-location',b.location)}
      ${ef('LinkedIn','b-linkedin',b.linkedin)}
    </div>
    <div class="col-span-2 flex gap-2 mt-2">
      <button onclick="saveBasic()" class="${BTN1}">保存</button>
      <button onclick="renderBasic(profileData.basic)" class="${BTN2}">取消</button>
    </div>`;
}

function saveBasic() {
  profileData.basic = {
    name: document.getElementById('b-name').value,
    email: document.getElementById('b-email').value,
    phone: document.getElementById('b-phone').value,
    location: document.getElementById('b-location').value,
    linkedin: document.getElementById('b-linkedin').value,
  };
  renderBasic(profileData.basic);
  saveProfile();
}

// ═══════════════════════════════════════════════
// 扩展信息
// ═══════════════════════════════════════════════
const EXTENDED_FIELDS = [
  { key: 'gender',       label: '性别',     type: 'select', options: ['男','女','保密'] },
  { key: 'birthdate',    label: '出生日期', type: 'text',   placeholder: '如 1999-08' },
  { key: 'ethnicity',    label: '民族',     type: 'select', options: ['汉族','满族','回族','蒙古族','藏族','维吾尔族','壮族','其他'] },
  { key: 'political',    label: '政治面貌', type: 'select', options: ['群众','共青团员','中共党员','中共预备党员','民主党派','其他'] },
  { key: 'hometown',     label: '籍贯',     type: 'text',   placeholder: '如 广东省广州市' },
  { key: 'health',       label: '健康状况', type: 'select', options: ['良好','一般','较差'] },
  { key: 'marriage',     label: '婚姻状况', type: 'select', options: ['未婚','已婚','离异'] },
  { key: 'height',       label: '身高(cm)', type: 'text',   placeholder: '如 170' },
  { key: 'weight',       label: '体重(kg)', type: 'text',   placeholder: '如 60' },
  { key: 'target_city',  label: '期望城市', type: 'text',   placeholder: '如 上海' },
  { key: 'salary_min',   label: '期望薪资（最低）', type: 'text', placeholder: '如 8000' },
  { key: 'salary_max',   label: '期望薪资（最高）', type: 'text', placeholder: '如 12000' },
  { key: 'availability', label: '到岗时间', type: 'select', options: ['随时到岗','1个月内','3个月内','半年内'] },
  { key: 'job_type',     label: '工作性质', type: 'select', options: ['全职','兼职','实习','不限'] },
  { key: 'industry',     label: '期望行业', type: 'text',   placeholder: '如 互联网 / 金融 / 咨询' },
  { key: 'job_category', label: '期望职位', type: 'text',   placeholder: '如 数据分析 / 投资研究' },
  { key: 'self_intro',   label: '自我评价', type: 'textarea', placeholder: '简短介绍核心优势和求职方向（150字以内）' },
];

function renderExtended(ext) {
  ext = ext || {};
  const filled = EXTENDED_FIELDS.filter(f => ext[f.key]);
  document.getElementById('extendedContent').innerHTML = filled.length === 0
    ? '<div class="col-span-2 text-sm text-gray-400">暂未填写，点击「编辑」补充</div>'
    : filled.map(f => `
        <div>
          <div class="label">${f.label}</div>
          <div class="value">${esc(ext[f.key])}</div>
        </div>`).join('');
}

function editExtended() {
  const ext = profileData.extended || {};
  document.getElementById('extendedContent').innerHTML = `
    <div class="col-span-2 grid grid-cols-2 gap-3">
      ${EXTENDED_FIELDS.map(f => {
        if (f.type === 'select') {
          const opts = f.options.map(o =>
            `<option ${ext[f.key]===o ? 'selected' : ''}>${o}</option>`
          ).join('');
          return `<div>
            <div class="label">${f.label}</div>
            <select id="ext-${f.key}" class="${INP}">
              <option value="">请选择</option>${opts}
            </select>
          </div>`;
        } else if (f.type === 'textarea') {
          return `<div class="col-span-2">
            <div class="label">${f.label}</div>
            <textarea id="ext-${f.key}" class="${TEA} h-20 mt-1" placeholder="${f.placeholder||''}">${esc(ext[f.key]||'')}</textarea>
          </div>`;
        } else {
          return `<div>
            <div class="label">${f.label}</div>
            <input id="ext-${f.key}" class="${INP}" value="${esc(ext[f.key]||'')}" placeholder="${f.placeholder||''}">
          </div>`;
        }
      }).join('')}
    </div>
    <div class="col-span-2 flex gap-2 mt-2">
      <button onclick="saveExtended()" class="${BTN1}">保存</button>
      <button onclick="renderExtended(profileData.extended)" class="${BTN2}">取消</button>
    </div>`;
}

function saveExtended() {
  const ext = {};
  EXTENDED_FIELDS.forEach(f => {
    const el = document.getElementById(`ext-${f.key}`);
    if (el && el.value.trim()) ext[f.key] = el.value.trim();
  });
  profileData.extended = ext;
  renderExtended(ext);
  saveProfile();
}
