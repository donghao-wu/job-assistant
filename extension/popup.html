<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .body { padding: 16px; }
    .label { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
    select {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #374151;
      background: white;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      margin-top: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }
    .status.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status.error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status.info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 14px 0; }
    .port-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .port-row label { font-size: 11px; color: #9ca3af; white-space: nowrap; }
    .port-row input {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      color: #6b7280;
      outline: none;
    }
    .port-row input:focus { border-color: #3b82f6; }
    .track-card {
      margin-top: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 11px 12px;
      display: none;
    }
    .track-card .tc-label { font-size: 11px; color: #166534; font-weight: 600; margin-bottom: 8px; }
    .track-card input {
      width: 100%;
      border: 1px solid #d1fae5;
      border-radius: 7px;
      padding: 6px 9px;
      font-size: 12px;
      color: #374151;
      background: white;
      outline: none;
      margin-bottom: 6px;
    }
    .track-card input:focus { border-color: #34d399; }
    .track-row { display: flex; gap: 6px; }
    .tc-btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .tc-btn.confirm { background: #22c55e; color: white; }
    .tc-btn.confirm:hover { background: #16a34a; }
    .tc-btn.skip { background: #e5e7eb; color: #6b7280; }
    .tc-btn.skip:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 求职小助手</h1>
    <p>一键填写网申表单</p>
  </div>
  <div class="body">
    <div class="label">选择档案</div>
    <select id="profileSelect">
      <option value="">加载中...</option>
    </select>

    <button class="btn" id="fillBtn">一键填入</button>

    <div class="status" id="status"></div>

    <!-- 投递记录确认卡 -->
    <div class="track-card" id="trackCard">
      <div class="tc-label">📌 记录此次投递？</div>
      <input type="text" id="tcCompany" placeholder="公司名称"/>
      <input type="text" id="tcPosition" placeholder="投递职位"/>
      <div class="track-row">
        <button class="tc-btn confirm" id="tcConfirm">记录</button>
        <button class="tc-btn skip" onclick="hideTrackCard()">跳过</button>
      </div>
    </div>

    <hr class="divider"/>

    <div class="port-row">
      <label>服务端口</label>
      <input type="text" id="portInput" value="8003" placeholder="8003"/>
    </div>
    <a id="openProfileLink" href="#" target="_blank"
      style="display:block; margin-top:10px; font-size:12px; color:#3b82f6; text-decoration:none; text-align:center; padding:7px; background:#eff6ff; border-radius:8px;">
      ✏️ 完善档案信息
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
