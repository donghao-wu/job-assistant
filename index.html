<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>简历优化助手</title>
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    #resultContent h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e40af;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #e0e7ff;
    }
    #resultContent ul, #resultContent ol {
      margin: 0.5rem 0 1rem 0;
      padding-left: 0;
      list-style: none;
    }
    #resultContent li {
      padding: 0.4rem 0.75rem;
      margin-bottom: 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #resultContent li:has-text, #resultContent li {
      background: #f8fafc;
    }
    #resultContent p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: #374151;
      background: #f0f9ff;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border-left: 3px solid #60a5fa;
      margin-top: 0.5rem;
    }
    html.dark body { background:#0f172a !important; color:#f1f5f9; }
    html.dark .bg-gray-50 { background:#0f172a !important; }
    html.dark .bg-white { background:#1e293b !important; }
    html.dark .text-gray-800 { color:#f1f5f9 !important; }
    html.dark .text-gray-700 { color:#e2e8f0 !important; }
    html.dark .text-gray-500 { color:#94a3b8 !important; }
    html.dark .text-gray-400 { color:#64748b !important; }
    html.dark .border-gray-200 { border-color:#334155 !important; }
    html.dark textarea, html.dark input { background:#0f172a !important; color:#f1f5f9 !important; border-color:#334155 !important; }
    html.dark textarea::placeholder { color:#475569 !important; }
    html.dark #resultContent h2 { color:#818cf8 !important; border-color:#1e3a5f !important; }
    html.dark #resultContent p { background:#1e293b !important; color:#cbd5e1 !important; border-color:#6366f1 !important; }
    html.dark #resultContent li { background:#1e293b !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-200">

  <div class="max-w-3xl mx-auto py-12 px-4">

    <!-- Nav -->
    <div class="flex justify-center gap-2 mb-8 items-center">
      <a href="/" class="px-5 py-2 rounded-full bg-blue-500 text-white text-sm font-medium">简历优化</a>
      <a href="/profile-page" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">我的档案</a>
      <a href="/tracker" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">投递追踪</a>
      <a href="/interview" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">面试准备</a>
      <a href="/match" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">岗位匹配</a>
      <a href="/offer" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">Offer对比</a>
      <a href="/nav" class="px-5 py-2 rounded-full bg-white text-gray-500 text-sm font-medium border border-gray-200 hover:border-blue-400 hover:text-blue-500 transition-colors">求职导航</a>
      <button onclick="toggleTheme()" id="themeBtn" class="w-9 h-9 rounded-full bg-white border border-gray-200 flex items-center justify-center text-base hover:border-gray-400 transition-colors shadow-sm">🌙</button>
    </div>

    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-800">简历优化助手</h1>
      <p class="text-gray-500 mt-2">上传简历 + 粘贴JD，AI 帮你针对性优化</p>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-2xl shadow-sm p-8 space-y-6">

      <!-- 上传简历 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">上传简历</label>
        <div id="dropzone"
          class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition-colors"
          onclick="document.getElementById('fileInput').click()">
          <p class="text-gray-400 text-sm" id="fileLabel">点击上传 PDF 或 Word 文件</p>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.docx" class="hidden"
          onchange="handleFile(this)"/>
      </div>

      <!-- JD输入 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">目标岗位 JD</label>
        <textarea id="jdInput" rows="8"
          class="w-full border border-gray-200 rounded-xl p-4 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
          placeholder="把招聘要求粘贴到这里..."></textarea>
      </div>

      <!-- 提交按钮 -->
      <button onclick="submit()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 rounded-xl transition-colors">
        开始分析
      </button>
    </div>

    <!-- 结果 -->
    <div id="resultBox" class="hidden mt-8 bg-white rounded-2xl shadow-sm p-8">
      <div id="loading" class="text-center py-8">
        <div class="inline-block w-8 h-8 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-gray-500 mt-3 text-sm" id="loadingText">AI 分析中，请稍候...</p>
      </div>
      <div id="resultContent" class="hidden prose prose-sm max-w-none text-gray-700"></div>

      <!-- 生成简历按钮（分析完成后显示）-->
      <div id="generateBox" class="hidden mt-6 pt-6 border-t border-gray-100">
        <button onclick="generateResume()"
          class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
          <span>✨ 生成优化简历（Word）</span>
        </button>
        <p class="text-center text-xs text-gray-400 mt-2">AI 将根据 JD 重写每条经历描述，生成可直接投递的 .docx 文件</p>
      </div>
    </div>

    <!-- 简历生成进度框 -->
    <div id="optimizeBox" class="hidden mt-4 bg-white rounded-2xl shadow-sm p-8">
      <div id="optimizeLoading" class="text-center py-8">
        <div class="inline-block w-8 h-8 border-4 border-green-400 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-gray-500 mt-3 text-sm">AI 正在改写简历内容...</p>
      </div>
      <div id="optimizeResult" class="hidden text-center py-4">
        <div class="text-4xl mb-3">📄</div>
        <p class="text-gray-700 font-medium mb-4">优化简历已生成！</p>
        <button onclick="downloadDocx()"
          class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-8 py-3 rounded-xl transition-colors">
          ⬇ 下载 Word 文件
        </button>
      </div>
    </div>

  </div>

  <script>
    let selectedFile = null;
    let optimizedData = null;

    function handleFile(input) {
      selectedFile = input.files[0];
      if (selectedFile) {
        document.getElementById('fileLabel').textContent = '✅ ' + selectedFile.name;
        document.getElementById('fileLabel').classList.add('text-blue-500');
      }
    }

    async function submit() {
      if (!selectedFile) { alert('请先上传简历文件'); return; }
      const jd = document.getElementById('jdInput').value.trim();
      if (!jd) { alert('请粘贴目标岗位JD'); return; }

      const resultBox = document.getElementById('resultBox');
      const loading = document.getElementById('loading');
      const resultContent = document.getElementById('resultContent');
      const generateBox = document.getElementById('generateBox');

      resultBox.classList.remove('hidden');
      loading.classList.remove('hidden');
      resultContent.classList.add('hidden');
      generateBox.classList.add('hidden');
      document.getElementById('optimizeBox').classList.add('hidden');
      optimizedData = null;
      resultBox.scrollIntoView({ behavior: 'smooth' });

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('jd', jd);

      try {
        const res = await fetch('/analyze', { method: 'POST', body: formData });
        const data = await res.json();

        loading.classList.add('hidden');
        resultContent.classList.remove('hidden');
        resultContent.innerHTML = marked.parse(data.result);
        resultContent.querySelectorAll('li').forEach(li => {
          const text = li.textContent;
          if (text.startsWith('✅')) {
            li.style.background = '#f0fdf4';
            li.style.borderLeft = '3px solid #4ade80';
            li.style.paddingLeft = '0.75rem';
          } else if (text.startsWith('📝')) {
            li.style.background = '#eff6ff';
            li.style.borderLeft = '3px solid #60a5fa';
            li.style.paddingLeft = '0.75rem';
          } else if (text.startsWith('⚠️')) {
            li.style.background = '#fff7ed';
            li.style.borderLeft = '3px solid #fb923c';
            li.style.paddingLeft = '0.75rem';
          }
        });
        generateBox.classList.remove('hidden');
      } catch (e) {
        loading.classList.add('hidden');
        resultContent.classList.remove('hidden');
        resultContent.innerHTML = '<p class="text-red-500">出错了，请检查服务是否正常运行。</p>';
      }
    }

    async function generateResume() {
      if (!selectedFile) return;
      const jd = document.getElementById('jdInput').value.trim();

      const optimizeBox = document.getElementById('optimizeBox');
      const optimizeLoading = document.getElementById('optimizeLoading');
      const optimizeResult = document.getElementById('optimizeResult');

      optimizeBox.classList.remove('hidden');
      optimizeLoading.classList.remove('hidden');
      optimizeResult.classList.add('hidden');
      optimizeBox.scrollIntoView({ behavior: 'smooth' });

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('jd', jd);

      try {
        const res = await fetch('/optimize-resume', { method: 'POST', body: formData });
        const result = await res.json();
        if (result.status !== 'ok') {
          optimizeLoading.classList.add('hidden');
          optimizeResult.classList.remove('hidden');
          optimizeResult.innerHTML = '<p class="text-red-500">简历生成失败：' + (result.message || '') + '</p>';
          return;
        }
        optimizedData = result.data;
        optimizeLoading.classList.add('hidden');
        optimizeResult.classList.remove('hidden');
      } catch (e) {
        optimizeLoading.classList.add('hidden');
        optimizeResult.classList.remove('hidden');
        optimizeResult.innerHTML = '<p class="text-red-500">出错了，请检查服务是否正常运行。</p>';
      }
    }

    async function downloadDocx() {
      if (!optimizedData) return;
      const res = await fetch('/build-docx', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: optimizedData })
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename\*?=(?:UTF-8'')?([^;]+)/i);
      a.download = match ? decodeURIComponent(match[1]) : 'optimized_resume.docx';
      a.click();
      URL.revokeObjectURL(url);
    }

    function toggleTheme() {
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
    }
    if (document.documentElement.classList.contains('dark'))
      document.getElementById('themeBtn').textContent = '☀️';
  </script>

</body>
</html>
