<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>投递追踪</title>
  <script>
    // Apply theme before paint to avoid flash
    (function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .status-badge { font-size:.75rem; font-weight:500; padding:.2rem .65rem; border-radius:9999px; }
    .kanban-col { min-height: 120px; }

    /* ── Dark mode overrides ── */
    html.dark body            { background:#0f172a !important; color:#f1f5f9; }
    html.dark .bg-gray-50     { background:#0f172a !important; }
    html.dark .bg-white       { background:#1e293b !important; }
    html.dark .bg-gray-100    { background:#334155 !important; }
    html.dark .shadow-sm      { box-shadow:0 1px 3px rgba(0,0,0,.4) !important; }
    html.dark .text-gray-800  { color:#f1f5f9 !important; }
    html.dark .text-gray-700  { color:#e2e8f0 !important; }
    html.dark .text-gray-600  { color:#cbd5e1 !important; }
    html.dark .text-gray-500  { color:#94a3b8 !important; }
    html.dark .text-gray-400  { color:#64748b !important; }
    html.dark .text-gray-300  { color:#475569 !important; }
    html.dark .border-gray-200{ border-color:#334155 !important; }
    html.dark .border-gray-100{ border-color:#1e293b !important; }
    html.dark .border-gray-50 { border-color:#1e293b !important; }
    html.dark .divide-gray-100 > * { border-color:#334155 !important; }
    html.dark input, html.dark select, html.dark textarea {
      background:#0f172a !important; color:#f1f5f9 !important;
      border-color:#334155 !important;
    }
    html.dark input::placeholder, html.dark textarea::placeholder { color:#475569 !important; }
    html.dark .hover\:bg-gray-50:hover { background:#334155 !important; }
    html.dark .bg-black\/40   { background:rgba(0,0,0,.6) !important; }
    html.dark .bg-black\/30   { background:rgba(0,0,0,.5) !important; }

    /* dark kanban cards */
    html.dark .kanban-col     { background:#1e293b !important; }
    html.dark .kanban-col .bg-white { background:#0f172a !important; }

    /* dark detail panel */
    html.dark #detailPanel > div:last-child { background:#1e293b !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-200">

<div class="max-w-7xl mx-auto py-10 px-4">

  <!-- Nav -->

<script>
const STATUS_CONFIG = {
  '待投递':  { bg: 'bg-gray-100',   text: 'text-gray-500',  dot: '#9ca3af' },
  '已投递':  { bg: 'bg-blue-50',    text: 'text-blue-600',  dot: '#3b82f6' },
  '简历通过':{ bg: 'bg-purple-50',  text: 'text-purple-600',dot: '#9333ea' },
  '笔试/测评':{ bg: 'bg-yellow-50', text: 'text-yellow-700',dot: '#eab308' },
  '面试中':  { bg: 'bg-orange-50',  text: 'text-orange-600',dot: '#f97316' },
  'Offer':   { bg: 'bg-green-50',   text: 'text-green-600', dot: '#22c55e' },
  '已拒绝':  { bg: 'bg-red-50',     text: 'text-red-500',   dot: '#ef4444' },
  '已放弃':  { bg: 'bg-gray-100',   text: 'text-gray-400',  dot: '#d1d5db' },
};
const STATUS_ORDER = Object.keys(STATUS_CONFIG);

let apps = [];
let currentView = 'kanban';
let statusChart = null, weekChart = null;

async function loadAll() {
  const [appsRes, statsRes] = await Promise.all([
    fetch('/applications').then(r => r.json()),
    fetch('/applications/stats').then(r => r.json()),
  ]);
  apps = appsRes;
  renderStats(statsRes);
  renderCharts(statsRes);
  renderHeatmap();
  populateStatusFilter();
  renderAll();
}

function renderStats(s) {
  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statProgress').textContent = s.in_progress;
  document.getElementById('statOffer').textContent = s.offers;
  document.getElementById('statRejected').textContent = s.rejected;
}

function renderCharts(s) {
  // Status donut
  const byStatus = s.by_status || {};
  const labels = Object.keys(byStatus);
  const values = Object.values(byStatus);
  const colors = labels.map(l => STATUS_CONFIG[l]?.dot || '#94a3b8');

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '65%',
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } } },
    }
  });

  // Weekly line chart — compute from apps client-side
  function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function getMondayStr(dateStr) {
    // parse as local date to avoid UTC offset shift
    const [y, m, day] = dateStr.split('-').map(Number);
    const d = new Date(y, m - 1, day);
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return localDateStr(d);
  }

  const weekMap = {};
  apps.forEach(a => {
    if (!a.applied_date) return;
    const mon = getMondayStr(a.applied_date);
    weekMap[mon] = (weekMap[mon] || 0) + 1;
  });

  const weekLabels = [], weekData = [];
  const now = new Date();
  const curDay = now.getDay();
  const thisMonday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  thisMonday.setDate(thisMonday.getDate() - (curDay === 0 ? 6 : curDay - 1));

  for (let i = 11; i >= 0; i--) {
    const mon = new Date(thisMonday.getFullYear(), thisMonday.getMonth(), thisMonday.getDate() - i * 7);
    const key = localDateStr(mon);
    weekLabels.push(`${mon.getMonth()+1}/${mon.getDate()}`);
    weekData.push(weekMap[key] || 0);
  }

  if (weekChart) weekChart.destroy();
  const wCtx = document.getElementById('weekChart').getContext('2d');
  const gradient = wCtx.createLinearGradient(0, 0, 0, 160);
  gradient.addColorStop(0, 'rgba(99,102,241,0.25)');
  gradient.addColorStop(1, 'rgba(99,102,241,0)');

  weekChart = new Chart(wCtx, {
    type: 'line',
    data: {
      labels: weekLabels,
      datasets: [{
        label: '投递数',
        data: weekData,
        borderColor: '#6366f1',
        borderWidth: 2,
        pointBackgroundColor: weekData.map(v => v > 0 ? '#6366f1' : 'transparent'),
        pointRadius: weekData.map(v => v > 0 ? 5 : 0),
        pointHoverRadius: 7,
        fill: true,
        backgroundColor: gradient,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: '#f3f4f6' } },
        x: { ticks: { font: { size: 10 }, color: '#9ca3af', maxRotation: 0 }, grid: { display: false } },
      },
    }
  });
}

function renderHeatmap() {
  const WEEKS = 20;
  const DAY_LABELS = ['日','一','二','三','四','五','六'];
  const COLORS = ['#e5e7eb','#bfdbfe','#60a5fa','#2563eb','#1e3a8a'];

  // Build date → count map from apps
  const countMap = {};
  apps.forEach(a => {
    if (a.applied_date) countMap[a.applied_date] = (countMap[a.applied_date] || 0) + 1;
  });

  // Find the Sunday that is WEEKS weeks ago
  const today = new Date();
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - today.getDay() - (WEEKS - 1) * 7);

  const grid = document.getElementById('heatmapGrid');
  grid.innerHTML = '';

  // Day-of-week label column
  const labelCol = document.createElement('div');
  labelCol.className = 'flex flex-col gap-1 mr-1';
  labelCol.innerHTML = `<div class="h-5"></div>` + // spacer for month row
    DAY_LABELS.map((d, i) => `<div class="h-3 text-xs text-gray-300 leading-3 w-3 text-center" style="${[0,2,4,6].includes(i)?'':'opacity:0'}">${d}</div>`).join('');
  grid.appendChild(labelCol);

  let currentMonth = -1;
  for (let w = 0; w < WEEKS; w++) {
    const col = document.createElement('div');
    col.className = 'flex flex-col gap-1';

    // Month label on first day of month
    const weekStart = new Date(startDate);
    weekStart.setDate(startDate.getDate() + w * 7);
    const monthLabel = document.createElement('div');
    monthLabel.className = 'h-5 text-xs text-gray-400 leading-5 whitespace-nowrap';
    const monthOfWeek = weekStart.getMonth();
    if (monthOfWeek !== currentMonth) {
      currentMonth = monthOfWeek;
      monthLabel.textContent = (monthOfWeek + 1) + '月';
    }
    col.appendChild(monthLabel);

    for (let d = 0; d < 7; d++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + w * 7 + d);
      if (date > today) {
        const empty = document.createElement('div');
        empty.className = 'w-3 h-3 rounded-sm';
        col.appendChild(empty);
        continue;
      }
      const dateStr = date.toISOString().slice(0, 10);
      const count = countMap[dateStr] || 0;
      const colorIdx = count === 0 ? 0 : count === 1 ? 1 : count === 2 ? 2 : count <= 4 ? 3 : 4;
      const cell = document.createElement('div');
      cell.className = 'w-3 h-3 rounded-sm cursor-default transition-transform hover:scale-125';
      cell.style.background = COLORS[colorIdx];
      cell.dataset.date = dateStr;
      cell.dataset.count = count;
      cell.addEventListener('mouseenter', e => {
        const tip = document.getElementById('heatmapTooltip');
        tip.textContent = `${dateStr}：${count} 条投递`;
        tip.classList.remove('hidden');
      });
      cell.addEventListener('mousemove', e => {
        const tip = document.getElementById('heatmapTooltip');
        tip.style.left = (e.clientX + 12) + 'px';
        tip.style.top  = (e.clientY - 28) + 'px';
      });
      cell.addEventListener('mouseleave', () => {
        document.getElementById('heatmapTooltip').classList.add('hidden');
      });
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

function populateStatusFilter() {
  const sel = document.getElementById('filterStatus');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部状态</option>';
  STATUS_ORDER.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    if (s === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function filteredApps() {
  const q = document.getElementById('filterInput').value.trim().toLowerCase();
  const st = document.getElementById('filterStatus').value;
  return apps.filter(a =>
    (!q || a.company.toLowerCase().includes(q) || a.position.toLowerCase().includes(q)) &&
    (!st || a.status === st)
  );
}

function renderAll() {
  if (currentView === 'kanban') renderKanban();
  else renderTable();
}

function setView(v) {
  currentView = v;
  document.getElementById('kanbanView').classList.toggle('hidden', v !== 'kanban');
  document.getElementById('tableView').classList.toggle('hidden', v !== 'table');
  document.getElementById('btnKanban').className = `view-btn px-4 py-2 rounded-lg text-sm font-medium ${v==='kanban' ? 'bg-blue-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`;
  document.getElementById('btnTable').className = `view-btn px-4 py-2 rounded-lg text-sm font-medium ${v==='table' ? 'bg-blue-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`;
  renderAll();
}

function renderKanban() {
  const list = filteredApps();
  const byStatus = {};
  STATUS_ORDER.forEach(s => byStatus[s] = []);
  list.forEach(a => { if (byStatus[a.status]) byStatus[a.status].push(a); });

  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '';
  STATUS_ORDER.forEach(status => {
    const cfg = STATUS_CONFIG[status];
    const cards = byStatus[status];
    const col = document.createElement('div');
    col.className = 'kanban-col flex-shrink-0 w-56 bg-gray-100 rounded-2xl p-3';
    col.innerHTML = `
      <div class="flex items-center gap-2 mb-3 px-1">
        <span class="w-2 h-2 rounded-full inline-block" style="background:${cfg.dot}"></span>
        <span class="text-xs font-semibold text-gray-600">${status}</span>
        <span class="ml-auto text-xs text-gray-400">${cards.length}</span>
      </div>
      <div class="space-y-2" id="col_${status.replace(/\//g,'_')}"></div>`;
    board.appendChild(col);
    const container = col.querySelector(`#col_${status.replace(/\//g,'_')}`);
    cards.forEach(a => container.appendChild(makeCard(a)));
  });
}

function makeCard(a) {
  const div = document.createElement('div');
  div.className = 'bg-white rounded-xl p-3 shadow-sm cursor-pointer hover:shadow-md transition-shadow';
  div.onclick = () => openDetail(a);
  div.innerHTML = `
    <p class="font-semibold text-gray-800 text-sm truncate">${a.company}</p>
    <p class="text-xs text-gray-400 mt-0.5 truncate">${a.position}</p>
    ${a.applied_date ? `<p class="text-xs text-gray-300 mt-2">${a.applied_date}</p>` : ''}
    ${a.salary_range ? `<p class="text-xs text-blue-400 mt-0.5">${a.salary_range}</p>` : ''}`;
  return div;
}

function renderTable() {
  const list = filteredApps();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('tableEmpty');
  tbody.innerHTML = '';
  if (!list.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  list.forEach(a => {
    const cfg = STATUS_CONFIG[a.status] || STATUS_CONFIG['已投递'];
    const tr = document.createElement('tr');
    tr.className = 'border-b border-gray-50 hover:bg-gray-50 cursor-pointer';
    tr.onclick = () => openDetail(a);
    tr.innerHTML = `
      <td class="p-4 font-medium text-gray-800">${a.company}</td>
      <td class="p-4 text-gray-600">${a.position}</td>
      <td class="p-4 text-gray-400 hidden md:table-cell">${a.applied_date || '–'}</td>
      <td class="p-4">
        <span class="status-badge ${cfg.bg} ${cfg.text}">${a.status}</span>
      </td>
      <td class="p-4 text-gray-400 hidden md:table-cell">${a.source || '–'}</td>
      <td class="p-4 text-gray-400 hidden lg:table-cell">${a.salary_range || '–'}</td>
      <td class="p-4">
        <button onclick="event.stopPropagation();deleteApp(${a.id})" class="text-gray-300 hover:text-red-400 text-lg leading-none transition-colors">×</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function openModal(a) {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modalTitle').textContent = a ? '编辑投递' : '添加投递';
  document.getElementById('editId').value = a ? a.id : '';
  document.getElementById('fCompany').value = a?.company || '';
  document.getElementById('fPosition').value = a?.position || '';
  document.getElementById('fDate').value = a?.applied_date || new Date().toISOString().slice(0,10);
  document.getElementById('fStatus').value = a?.status || '已投递';
  document.getElementById('fSource').value = a?.source || '';
  document.getElementById('fLocation').value = a?.location || '';
  document.getElementById('fSalary').value = a?.salary_range || '';
  document.getElementById('fUrl').value = a?.job_url || '';
  document.getElementById('fNotes').value = a?.notes || '';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function saveApp() {
  const company = document.getElementById('fCompany').value.trim();
  const position = document.getElementById('fPosition').value.trim();
  if (!company || !position) { alert('请填写公司和职位'); return; }

  const payload = {
    company, position,
    applied_date: document.getElementById('fDate').value,
    status: document.getElementById('fStatus').value,
    source: document.getElementById('fSource').value,
    location: document.getElementById('fLocation').value,
    salary_range: document.getElementById('fSalary').value,
    job_url: document.getElementById('fUrl').value,
    notes: document.getElementById('fNotes').value,
  };

  const id = document.getElementById('editId').value;
  if (id) {
    await fetch(`/applications/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  } else {
    await fetch('/applications', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  }
  closeModal();
  await loadAll();
}

async function deleteApp(id) {
  if (!confirm('确认删除这条投递记录？')) return;
  await fetch(`/applications/${id}`, { method: 'DELETE' });
  await loadAll();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// also reload detail panel after modal save
const _origSaveApp = saveApp;
saveApp = async function() {
  await _origSaveApp();
  if (currentApp) {
    const fresh = apps.find(a => a.id === currentApp.id);
    if (fresh) { currentApp = fresh; renderDetailHeader(); }
  }
};

// ─── Detail Panel ───────────────────────────────────────

let currentApp = null;
let currentEventType = 'note';

const EVENT_CONFIG = {
  interview: { icon: '🎙', label: '面试',    color: 'text-orange-500', bg: 'bg-orange-50' },
  test:      { icon: '📝', label: '笔试/测评', color: 'text-yellow-600', bg: 'bg-yellow-50' },
  status:    { icon: '🔄', label: '状态变更', color: 'text-purple-500', bg: 'bg-purple-50' },
  note:      { icon: '💬', label: '备注',    color: 'text-gray-500',   bg: 'bg-gray-100'  },
};

async function openDetail(a) {
  currentApp = a;
  document.getElementById('detailPanel').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  hideAddEvent();
  dpTab('timeline');
  renderDetailHeader();
  renderDetailInfo();
  await loadTimeline();
}

function closeDetail() {
  document.getElementById('detailPanel').classList.add('hidden');
  document.body.style.overflow = '';
  currentApp = null;
}

function renderDetailHeader() {
  const a = currentApp;
  const cfg = STATUS_CONFIG[a.status] || STATUS_CONFIG['已投递'];
  document.getElementById('dpCompany').textContent  = a.company;
  document.getElementById('dpPosition').textContent = a.position;
  const badge = document.getElementById('dpStatusBadge');
  badge.textContent = a.status;
  badge.className = `text-xs font-medium px-2.5 py-0.5 rounded-full ${cfg.bg} ${cfg.text}`;
  const meta = [
    a.applied_date ? `📅 ${a.applied_date}` : null,
    a.location     ? `📍 ${a.location}`     : null,
    a.salary_range ? `💰 ${a.salary_range}` : null,
    a.source       ? `🔗 ${a.source}`       : null,
  ].filter(Boolean);
  document.getElementById('dpMeta').innerHTML = meta.map(m =>
    `<span class="text-xs text-gray-400">${m}</span>`
  ).join('');

  // Status steps
  const steps = document.getElementById('dpStatusSteps');
  steps.innerHTML = '';
  STATUS_ORDER.forEach((s, i) => {
    const active = s === a.status;
    const past   = STATUS_ORDER.indexOf(a.status) > i &&
                   !['已拒绝','已放弃'].includes(s);
    const dot = document.createElement('div');
    dot.className = 'flex items-center gap-1';
    const circle = `<span class="w-2 h-2 rounded-full inline-block flex-shrink-0" style="background:${active || past ? STATUS_CONFIG[s].dot : '#e5e7eb'}"></span>`;
    const label  = `<span class="text-xs ${active ? 'font-semibold text-gray-700' : 'text-gray-400'} whitespace-nowrap">${s}</span>`;
    const arrow  = i < STATUS_ORDER.length-1 ? `<span class="text-gray-200 mx-0.5 text-xs">›</span>` : '';
    dot.innerHTML = circle + label + arrow;
    steps.appendChild(dot);
  });
}

function renderDetailInfo() {
  const a = currentApp;
  const fields = [
    ['公司', a.company], ['职位', a.position], ['状态', a.status],
    ['投递日期', a.applied_date], ['来源', a.source],
    ['地点', a.location], ['薪资', a.salary_range],
    ['职位链接', a.job_url ? `<a href="${a.job_url}" target="_blank" class="text-blue-500 underline text-sm truncate block max-w-xs">${a.job_url}</a>` : '–'],
    ['备注', a.notes],
  ];
  document.getElementById('dpInfoGrid').innerHTML = fields.map(([k, v]) => `
    <div class="flex gap-3 py-2 border-b border-gray-50">
      <span class="text-xs text-gray-400 w-20 flex-shrink-0 pt-0.5">${k}</span>
      <span class="text-sm text-gray-700 flex-1">${v && v !== '无' ? v : '<span class="text-gray-300">–</span>'}</span>
    </div>`).join('');
}

function dpTab(tab) {
  document.getElementById('paneTimeline').classList.toggle('hidden', tab !== 'timeline');
  document.getElementById('paneInfo').classList.toggle('hidden', tab !== 'info');
  ['Timeline','Info'].forEach(t => {
    const btn = document.getElementById('tab'+t);
    const active = t.toLowerCase() === tab;
    btn.className = `dp-tab py-3 text-sm font-medium mr-5 ${active ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400'}`;
  });
}

async function loadTimeline() {
  if (!currentApp) return;
  const events = await fetch(`/applications/${currentApp.id}/events`).then(r => r.json());
  const container = document.getElementById('dpTimeline');
  const empty     = document.getElementById('dpTimelineEmpty');
  container.innerHTML = '';
  if (!events.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  events.forEach(ev => {
    const cfg = EVENT_CONFIG[ev.event_type] || EVENT_CONFIG.note;
    let extra = '';
    if (ev.event_type === 'interview' || ev.event_type === 'test') {
      try {
        const d = JSON.parse(ev.content || '{}');
        if (d.type || d.result) extra = `<div class="flex gap-2 mt-1 flex-wrap">
          ${d.type   ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">${d.type}</span>` : ''}
          ${d.result ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">${d.result}</span>` : ''}
          ${d.notes  ? `<p class="text-xs text-gray-500 mt-1 w-full">${d.notes}</p>` : ''}
        </div>`;
      } catch(_) { extra = ev.content ? `<p class="text-xs text-gray-500 mt-1">${ev.content}</p>` : ''; }
    } else {
      extra = ev.content ? `<p class="text-xs text-gray-500 mt-1">${ev.content}</p>` : '';
    }
    const div = document.createElement('div');
    div.className = 'flex gap-3';
    div.innerHTML = `
      <div class="flex flex-col items-center">
        <div class="w-8 h-8 rounded-full ${cfg.bg} flex items-center justify-center text-base flex-shrink-0">${cfg.icon}</div>
        <div class="w-px flex-1 bg-gray-100 mt-1"></div>
      </div>
      <div class="flex-1 pb-4">
        <div class="flex items-center justify-between gap-2">
          <span class="text-sm font-medium text-gray-700">${ev.title || cfg.label}</span>
          <div class="flex items-center gap-2">
            ${ev.event_date ? `<span class="text-xs text-gray-300">${ev.event_date}</span>` : ''}
            <button onclick="deleteEvent(${ev.id})" class="text-gray-200 hover:text-red-400 text-base leading-none">×</button>
          </div>
        </div>
        ${extra}
      </div>`;
    container.appendChild(div);
  });
}

function showAddEvent(type) {
  currentEventType = type;
  document.getElementById('addEventForm').classList.remove('hidden');
  document.getElementById('evInterviewFields').classList.toggle('hidden', type !== 'interview');
  document.getElementById('evStatusField').classList.toggle('hidden', type !== 'status');
  document.getElementById('evTitle').placeholder = {
    interview: '一面 / 二面 / HR面...',
    test: '笔试 / 在线测评...',
    status: '状态更新',
    note: '添加备注...',
  }[type] || '';
  document.getElementById('evDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('evTitle').focus();
}

function hideAddEvent() {
  document.getElementById('addEventForm').classList.add('hidden');
  document.getElementById('evTitle').value = '';
  document.getElementById('evContent').value = '';
}

async function submitEvent() {
  if (!currentApp) return;
  const title = document.getElementById('evTitle').value.trim();
  const date  = document.getElementById('evDate').value;
  let content = document.getElementById('evContent').value.trim();

  if (currentEventType === 'interview' || currentEventType === 'test') {
    content = JSON.stringify({
      type:   document.getElementById('evInterviewType').value,
      result: document.getElementById('evInterviewResult').value,
      notes:  content,
    });
  } else if (currentEventType === 'status') {
    const newStatus = document.getElementById('evNewStatus').value;
    // update application status
    const updated = { ...currentApp, status: newStatus };
    await fetch(`/applications/${currentApp.id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(updated),
    });
    content = `${currentApp.status} → ${newStatus}`;
    await loadAll();
    currentApp = apps.find(a => a.id === currentApp.id) || currentApp;
    renderDetailHeader();
  }

  await fetch(`/applications/${currentApp.id}/events`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ event_type: currentEventType, title, content, event_date: date }),
  });
  hideAddEvent();
  await loadTimeline();
}

async function deleteEvent(eventId) {
  if (!currentApp) return;
  await fetch(`/applications/${currentApp.id}/events/${eventId}`, { method: 'DELETE' });
  await loadTimeline();
}

// ─── Theme toggle ────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}

// Sync button icon on load
if (document.documentElement.classList.contains('dark'))
  document.getElementById('themeBtn').textContent = '☀️';

loadAll();
</script>
