<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>求职导航</title>
  <script>
    (function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <style>
    html.dark body            { background:#0f172a !important; color:#f1f5f9; }
    html.dark .bg-gray-50     { background:#0f172a !important; }
    html.dark .bg-white       { background:#1e293b !important; }
    html.dark .bg-gray-100    { background:#334155 !important; }
    html.dark .shadow-sm      { box-shadow:0 1px 3px rgba(0,0,0,.4) !important; }
    html.dark .text-gray-800  { color:#f1f5f9 !important; }
    html.dark .text-gray-700  { color:#e2e8f0 !important; }
    html.dark .text-gray-600  { color:#cbd5e1 !important; }
    html.dark .text-gray-500  { color:#94a3b8 !important; }
    html.dark .text-gray-400  { color:#64748b !important; }
    html.dark .border-gray-200{ border-color:#334155 !important; }
    html.dark .border-gray-100{ border-color:#1e293b !important; }
    html.dark input           { background:#0f172a !important; color:#f1f5f9 !important; border-color:#334155 !important; }
    html.dark input::placeholder { color:#475569 !important; }
    html.dark .hover\:bg-gray-50:hover { background:#334155 !important; }
    html.dark .tab-btn        { background:#1e293b !important; color:#94a3b8 !important; border-color:#334155 !important; }
    html.dark .tab-btn.active { background:#3b82f6 !important; color:#fff !important; border-color:#3b82f6 !important; }

    .tab-btn { transition: all .15s; cursor: pointer; }
    .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .company-card { transition: transform .15s, box-shadow .15s; }
    .company-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    html.dark .company-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.45) !important; }
    .link-btn { transition: all .12s; font-size:.73rem; font-weight:500; padding:.22rem .6rem; border-radius:9999px; display:inline-block; }
    .section-header { font-size:.7rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#94a3b8; margin:1.75rem 0 .75rem; }

// ── State ─────────────────────────────────────────────
let currentTab = 'all';

// ── Render ─────────────────────────────────────────────
function renderCards() {
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  const grid = document.getElementById('cardGrid');
  const emptyTip = document.getElementById('emptyTip');
  const statsBar = document.getElementById('statsBar');

  const filtered = companies.filter(c => {
    const matchCat = currentTab === 'all' || c.cat === currentTab;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  grid.innerHTML = '';

  if (filtered.length === 0) {
    emptyTip.classList.remove('hidden');
    statsBar.textContent = '';
    return;
  }
  emptyTip.classList.add('hidden');
  statsBar.textContent = `共 ${filtered.length} 个结果`;

  filtered.forEach(c => {
    const meta = CAT_META[c.cat] || { label: c.cat, color:'bg-gray-100 text-gray-500' };
    const linksHtml = c.links.map(l => {
      const style = l.type === 'c'
        ? 'bg-violet-100 text-violet-700 hover:bg-violet-200'
        : l.type === 's'
          ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200'
          : 'bg-gray-100 text-gray-600 hover:bg-gray-200';
      return `<a href="${l.url}" target="_blank" rel="noopener" class="link-btn ${style}">${l.label} ↗</a>`;
    }).join('');

    const el = document.createElement('div');
    el.className = `company-card bg-white rounded-2xl p-4 border ${c.border} shadow-sm flex flex-col gap-3`;
    el.innerHTML = `
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl ${c.iconBg} flex items-center justify-center text-lg flex-shrink-0">${c.icon}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span class="font-semibold text-gray-800 text-sm">${c.name}</span>
            <span class="text-xs px-1.5 py-0.5 rounded-full font-medium ${meta.color}">${meta.label}</span>
          </div>
          <p class="text-xs text-gray-500 mt-0.5 leading-relaxed line-clamp-2">${c.desc}</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-1.5 pt-2 border-t border-gray-100">${linksHtml}</div>
    `;
    grid.appendChild(el);
  });
}

function setTab(btn, tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}
if (document.documentElement.classList.contains('dark'))
  document.getElementById('themeBtn').textContent = '☀️';

renderCards();
</script>
